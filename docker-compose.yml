# =============================================================================
# Future Farm Logistic — Local Development
# =============================================================================
# Usage:
#   docker-compose up           # Start all services
#   docker-compose up db        # Start database only
#   docker-compose logs -f api  # Follow API logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: futurefarm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-futurefarm}
      POSTGRES_USER: ${POSTGRES_USER:-futurefarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-futurefarm}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (for Bull queues)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: futurefarm_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # NestJS API (hot-reload via ts-node-dev via pnpm dev)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: deps
    container_name: futurefarm_api
    restart: unless-stopped
    command: pnpm --filter @futurefarm/api dev
    environment:
      NODE_ENV: development
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-futurefarm}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-futurefarm}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_not_for_production}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}
      CORS_ORIGINS: http://localhost:3001
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # React SPA (Vite dev server)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: builder
    container_name: futurefarm_web
    restart: unless-stopped
    command: pnpm --filter @futurefarm/web dev --host
    environment:
      VITE_API_BASE_URL: http://localhost:3000/v1
    ports:
      - '3001:3001'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
